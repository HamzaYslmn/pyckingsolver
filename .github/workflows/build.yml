name: Build & Publish

on:
  push:
    tags: ["v*"]
  pull_request:

jobs:

  # MARK: - Build platform wheels
  build-wheel:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform-tag: win_amd64
            binary-name: packingsolver_irregular.exe
          - os: ubuntu-latest
            platform-tag: manylinux_2_35_x86_64
            binary-name: packingsolver_irregular

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: astral-sh/setup-uv@v5

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: sudo apt-get -y install liblapack-dev libbz2-dev

    - name: Build C++ solver
      working-directory: extern/packingsolver
      run: |
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release --parallel

    # Copy compiled binary into the Python package
    - name: Bundle solver binary (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p python/packingsolver/bin
        cp extern/packingsolver/build/src/irregular/${{ matrix.binary-name }} \
           python/packingsolver/bin/

    - name: Bundle solver binary (Windows)
      if: runner.os == 'Windows'
      run: |
        New-Item -ItemType Directory -Path python/packingsolver/bin -Force | Out-Null
        Copy-Item extern/packingsolver/build/src/irregular/Release/${{ matrix.binary-name }} `
                   python/packingsolver/bin/

    # Build wheel and retag with platform
    - name: Build wheel
      working-directory: python
      run: uv build --wheel -o ../dist

    - name: Tag wheel with platform (Linux)
      if: runner.os == 'Linux'
      run: uvx wheel tags --remove --platform-tag ${{ matrix.platform-tag }} dist/$(ls dist)

    - name: Tag wheel with platform (Windows)
      if: runner.os == 'Windows'
      run: |
        $whl = (Get-ChildItem dist\*.whl).Name
        uvx wheel tags --remove --platform-tag ${{ matrix.platform-tag }} dist\$whl

    - uses: actions/upload-artifact@v4
      with:
        name: wheel-${{ matrix.os }}
        path: dist/*.whl

  # MARK: - Publish to PyPI
  publish:
    needs: build-wheel
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist
